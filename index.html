<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Lista de Tarefas</title>
    <link rel="stylesheet" href="estilotarefas.css">
</head>
<body>

    <div class="container">
        <div class="card">
            <h1 id="titulo">Minhas Tarefas</h1>
            
            <p id="contador">Tarefas pendentes: <span>0</span></p>
            
            <label for="nova-tarefa">O que precisa fazer?</label>
            <input type="text" id="nova-tarefa" placeholder="Digite uma tarefa...">
            <button id="btn-adicionar">Adicionar</button>

            <ul id="lista-tarefas"></ul>
        </div>
    </div>

    <script src="scripttarefas.js"></script>
</body>
</html>
